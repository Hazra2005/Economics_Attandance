<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Attendance</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap');

*{
  box-sizing:border-box;
  margin:0;
  padding:0;
}

body{
  font-family:'Poppins',sans-serif;
  background:linear-gradient(135deg,#36d1dc,#5b86e5);
  display:flex;
  justify-content:center;
  align-items:flex-start;
  min-height:100vh;
  padding:12px;
}

.container{
  width:100%;
  max-width:420px;
  background:#fff;
  padding:18px;
  border-radius:18px;
  box-shadow:0 15px 35px rgba(0,0,0,0.25);
  position:relative;
}

.top-bar{
  display:flex;
  justify-content:flex-start;
  margin-bottom:12px;
}

.back-btn{
  background:#333;
  color:#fff;
  border:none;
  padding:10px 14px;
  border-radius:10px;
  cursor:pointer;
  font-size:13px;
  width:auto;
}

h2{
  text-align:center;
  margin-bottom:16px;
  font-size:24px;
  color:#222;
}

select,input,button{
  width:100%;
  padding:13px 14px;
  margin-bottom:12px;
  border-radius:12px;
  border:1px solid #ddd;
  font-size:16px;
  outline:none;
}

select:focus,input:focus{
  border-color:#5b86e5;
  box-shadow:0 0 0 3px rgba(91,134,229,0.15);
}

button{
  background:#5b86e5;
  color:#fff;
  border:none;
  font-weight:600;
  cursor:pointer;
  transition:0.2s;
}

button:active{
  transform:scale(0.98);
}

.full-btn{
  background:#6f42c1;
}

.result{
  margin-top:8px;
  padding:14px;
  background:#f4f6fb;
  border-radius:14px;
  font-size:14px;
  line-height:1.8;
  word-wrap:break-word;
  min-height:60px;
}

.low{
  color:#e53935;
  font-weight:700;
}

.good{
  color:#1b8f3a;
  font-weight:700;
}

.loader{
  position:absolute;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(255,255,255,0.82);
  display:none;
  justify-content:center;
  align-items:center;
  border-radius:18px;
  z-index:10;
}

.spinner{
  width:44px;
  height:44px;
  border:5px solid #d9d9d9;
  border-top:5px solid #5b86e5;
  border-radius:50%;
  animation:spin 1s linear infinite;
}

.maintenance-box{
  margin-top:14px;
  display:none;
  background:#f9f7ff;
  border:2px dashed #6f42c1;
  border-radius:16px;
  padding:20px 14px;
  text-align:center;
  animation:fadeIn 0.35s ease;
}

.maintenance-icon{
  font-size:40px;
  margin-bottom:10px;
  animation:float 2s ease-in-out infinite;
}

.maintenance-box h3{
  color:#6f42c1;
  font-size:20px;
  margin-bottom:8px;
}

.maintenance-box p{
  font-size:14px;
  color:#555;
  line-height:1.7;
}

.maintenance-dots{
  display:flex;
  justify-content:center;
  gap:8px;
  margin-top:14px;
}

.maintenance-dots span{
  width:10px;
  height:10px;
  border-radius:50%;
  background:#6f42c1;
  animation:bounce 1.4s infinite ease-in-out;
}

.maintenance-dots span:nth-child(2){
  animation-delay:0.2s;
}

.maintenance-dots span:nth-child(3){
  animation-delay:0.4s;
}

@keyframes spin{
  0%{transform:rotate(0deg);}
  100%{transform:rotate(360deg);}
}

@keyframes fadeIn{
  from{opacity:0;transform:translateY(10px);}
  to{opacity:1;transform:translateY(0);}
}

@keyframes float{
  0%{transform:translateY(0);}
  50%{transform:translateY(-8px);}
  100%{transform:translateY(0);}
}

@keyframes bounce{
  0%,80%,100%{transform:translateY(0);}
  40%{transform:translateY(-8px);}
}

/* Small mobile */
@media (max-width:480px){
  body{
    padding:10px;
  }

  .container{
    max-width:100%;
    padding:14px;
    border-radius:16px;
  }

  h2{
    font-size:20px;
    margin-bottom:14px;
  }

  select,input,button{
    font-size:16px;
    padding:12px;
    border-radius:10px;
  }

  .back-btn{
    font-size:12px;
    padding:9px 12px;
  }

  .result{
    font-size:13px;
    padding:12px;
    line-height:1.7;
  }

  .maintenance-box{
    padding:16px 12px;
  }

  .maintenance-box h3{
    font-size:18px;
  }

  .maintenance-box p{
    font-size:13px;
  }

  .maintenance-icon{
    font-size:34px;
  }
}

/* Tablet */
@media (min-width:768px){
  .container{
    max-width:480px;
    padding:22px;
  }

  h2{
    font-size:26px;
  }

  .result{
    font-size:15px;
  }
}
</style>
</head>

<body>

<div class="container">

  <div class="loader" id="loader">
    <div class="spinner"></div>
  </div>

  <div class="top-bar">
    <button class="back-btn" onclick="goBack()">← Back</button>
  </div>

  <h2>Student Attendance</h2>

  <select id="department">
    <option value="">Select Department & Semester 👈</option>
    <option value="CS_4">Computer Science - 4th Sem 👩🏻‍💻</option>
    <option value="CS_6">Computer Science - 6th Sem 👩🏻‍💻</option>
    <option value="GEO_4">Geography - 4th Sem 🌏</option>
    <option value="GEO_6">Geography - 6th Sem 🌏</option>
  </select>

  <input type="text" id="roll" placeholder="Enter Roll Number">

  <button onclick="viewAttendance()">View Attendance 👀</button>
  <button class="full-btn" onclick="showMaintenance()">Show Full Attendance 📋</button>

  <div id="result" class="result">Search your roll number to view attendance.</div>

  <div id="maintenanceBox" class="maintenance-box">
    <div class="maintenance-icon">🛠️</div>
    <h3>Page Under Maintenance</h3>
    <p>
      Full Attendance section is currently under maintenance.<br>
      It will be available after a few months.
    </p>
    <div class="maintenance-dots">
      <span></span>
      <span></span>
      <span></span>
    </div>
  </div>

</div>

<script>
const SCRIPT_URL="https://script.google.com/macros/s/AKfycbyLZWOug-UBtNm9hRbPDNT7UJtYtETAF4Vq7iPV_Wnmc38D_Wyyxpy4rq-0a37T3i7pVQ/exec";

function showLoader(){
  document.getElementById("loader").style.display="flex";
}

function hideLoader(){
  document.getElementById("loader").style.display="none";
}

function goBack(){
  window.location.href="index.html";
}

function getSheetName(dept){
  if(dept==="CS_4") return "CS4_Attendance";
  if(dept==="CS_6") return "CS6_Attendance";
  if(dept==="GEO_4") return "GEO4_Attendance";
  if(dept==="GEO_6") return "GEO6_Attendance";
  return "";
}

function getDepartmentLabel(dept){
  if(dept==="CS_4") return "Computer Science - 4th Sem";
  if(dept==="CS_6") return "Computer Science - 6th Sem";
  if(dept==="GEO_4") return "Geography - 4th Sem";
  if(dept==="GEO_6") return "Geography - 6th Sem";
  return "";
}

function viewAttendance(){
  let dept=document.getElementById("department").value;
  let roll=document.getElementById("roll").value.trim();

  document.getElementById("maintenanceBox").style.display="none";

  if(dept==="" || roll===""){
    alert("Fill all fields");
    return;
  }

  showLoader();

  fetch(`${SCRIPT_URL}?sheet=${getSheetName(dept)}`)
  .then(res=>res.json())
  .then(data=>{
    hideLoader();

    let total=0,present=0,absent=0,name="";

    for(let i=1;i<data.length;i++){
      if(String(data[i][1]).trim()===roll){
        total++;
        name=data[i][2];
        if(String(data[i][3]).trim().toLowerCase()==="present"){
          present++;
        }else{
          absent++;
        }
      }
    }

    if(total===0){
      document.getElementById("result").innerHTML="No records found.";
      return;
    }

    let percent=((present/total)*100).toFixed(2);
    let percentClass=percent<75?"low":"good";
    let presentClass=present>0?"good":"low";
    let absentClass=absent>0?"low":"good";

    document.getElementById("result").innerHTML=
    `<strong>Name:</strong> ${name}<br>
    <strong>Roll:</strong> ${roll}<br>
    <strong>Department:</strong> ${getDepartmentLabel(dept)}<br><br>
    <strong>Total Classes:</strong> ${total}<br>
    <strong>Present:</strong> <span class="${presentClass}">${present}</span><br>
    <strong>Absent:</strong> <span class="${absentClass}">${absent}</span><br><br>
    <strong>Attendance:</strong> <span class="${percentClass}">${percent}%</span>`;
  })
  .catch(error=>{
    hideLoader();
    document.getElementById("result").innerHTML="Failed to fetch attendance data.";
    console.log(error);
  });
}

function showMaintenance(){
  document.getElementById("result").innerHTML="";
  document.getElementById("maintenanceBox").style.display="block";
}

/*
function showFullAttendance(){
  // Temporarily commented
}
*/
</script>

</body>
</html>
